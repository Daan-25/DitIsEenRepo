name: Deploy C++ with CMake to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Copy project files to VM
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "mkdir -p ~/hellocpp"
          scp CMakeLists.txt ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/hellocpp/CMakeLists.txt
          scp main.cpp ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/hellocpp/main.cpp

      - name: Build with CMake and restart service
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} '
            set -e
            sudo apt-get update
            sudo apt-get install -y build-essential cmake

            mkdir -p ~/hellocpp/build
            cd ~/hellocpp

            cmake -S . -B build
            cmake --build build -j

            sudo systemctl restart hellocpp
            sudo systemctl status hellocpp --no-pager
          '
