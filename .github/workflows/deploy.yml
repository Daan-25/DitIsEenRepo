name: Build and deploy C++ app to Azure Web App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: hellocppacr.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build image
        run: |
          docker build -t hellocppacr.azurecr.io/cpp-hello:${{ github.sha }} .
          docker tag hellocppacr.azurecr.io/cpp-hello:${{ github.sha }} hellocppacr.azurecr.io/cpp-hello:latest

      - name: Push image
        run: |
          docker push hellocppacr.azurecr.io/cpp-hello:${{ github.sha }}
          docker push hellocppacr.azurecr.io/cpp-hello:latest

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: hellocppwebapp
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: 'hellocppacr.azurecr.io/cpp-hello:${{ github.sha }}'
