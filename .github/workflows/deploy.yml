name: Deploy C++ to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Copy source to VM
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "mkdir -p ~/hellocpp"
          scp main.cpp ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/hellocpp/main.cpp

      - name: Build and restart on VM
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} '
            set -e
            sudo apt-get update
            sudo apt-get install -y build-essential
            g++ -O2 -std=c++17 -o ~/hellocpp/hello-web ~/hellocpp/main.cpp
            sudo systemctl restart hellocpp
            sudo systemctl status hellocpp --no-pager
          '
